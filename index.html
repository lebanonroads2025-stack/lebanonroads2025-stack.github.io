<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lebanon Roads 2025</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background-color: #111; color: #fff; }
    nav { display:flex; justify-content: space-between; align-items:center; padding:10px 20px; background:#222; }
    .flag img { height:20px; width:auto; display:block; }
    .social-links a { margin-left:10px; color:#fff; text-decoration:none; font-size:18px; }
    .ticker-wrap { overflow:hidden; background:#111; border-top:1px solid #444; border-bottom:1px solid #444; }
    .ticker-inner { display:flex; animation:scroll 20s linear infinite; }
    .ticker-item { flex: none; padding:0 40px; white-space: nowrap; }
    .up { color:#0f0; }
    .dn { color:#f00; }
    @keyframes scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
    .main { text-align:center; padding:50px 20px; }
    .links a { display:block; margin:15px auto; padding:15px; width:200px; background:#333; color:#fff; text-decoration:none; border-radius:10px; transition:0.3s; }
    .links a:hover { background:#555; }
  </style>
</head>
<body>

  <!-- Nav with Lebanese flag and social links -->
  <nav>
    <div class="flag">
      <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Flag_of_Lebanon.svg" alt="Lebanese Flag">
    </div>
    <div class="social-links">
      <a href="https://www.instagram.com/lebanon.roads" target="_blank">📸 Instagram</a>
      <a href="https://www.tiktok.com/@lebanon.roads" target="_blank">🎵 TikTok</a>

      <a href="https://t.me/LebanonRoads" target="_blank">✈️ Telegram</a>
      <a href="https://wa.me/YOURWHATSAPPNUMBER" target="_blank">💬 WhatsApp</a>
    </div>
  </nav>

  <!-- Trading/Market Ticker -->
  <div class="ticker-wrap">
    <div class="ticker-inner">
      <div class="ticker-item">BTC/USD <span class="up">+1.2%</span></div>
      <div class="ticker-item">ETH/USD <span class="dn">-0.7%</span></div>
      <div class="ticker-item">GOLD <span class="up">+0.3%</span></div>
      <div class="ticker-item">OIL <span class="dn">-1.1%</span></div>
      <div class="ticker-item">AAPL <span class="up">+0.5%</span></div>
      <!-- duplicate items for infinite scroll -->
      <div class="ticker-item">BTC/USD <span class="up">+1.2%</span></div>
      <div class="ticker-item">ETH/USD <span class="dn">-0.7%</span></div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <h1>Lebanon Roads 2025</h1>
    <p>Your destination for all car content in Lebanon</p>

    <div class="links">
      <a href="https://www.instagram.com/lebanon.roads" target="_blank">Instagram</a>
      <a href="https://www.tiktok.com/@lebanon.roads" target="_blank">TikTok</a>
      <a href="https://www.youtube.com/channel/UCM_14sQQ0vM0_1H2edJq9tw" target="_blank">YouTube</a>
      <a href="https://x.com/LebanonRoads" target="_blank">Twitter/X</a>

      <a href="https://wa.me/YOURWHATSAPPNUMBER" target="_blank">WhatsApp</a>
      <a href="https://www.anghami.com/user/YOURANHGAMIPROFILE" target="_blank">🎧 Anghami</a>
    </div>
  </div>

</body>
</html>
