<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lebanon Roads 2025</title>
  <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/5/59/Flag_of_Lebanon.svg">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 999;
    }
    header img.flag {
      width: 50px;
      height: auto;
    }
    header .tradingview-widget-container {
      flex: 1;
      margin-left: 20px;
    }
    main {
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .social-links a {
      text-decoration: none;
      color: #fff;
      background-color: #333;
      padding: 10px 15px;
      border-radius: 8px;
      transition: 0.3s;
    }
    .social-links a:hover {
      background-color: #555;
    }
    section.anghami {
      margin-top: 40px;
    }
    iframe {
      border: none;
    }
  </style>
</head>
<body>

<header>
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/59/Flag_of_Lebanon.svg" alt="Lebanon Flag" class="flag">
  
  <!-- TradingView Ticker Widget -->
  <div class="tradingview-widget-container">
    <div id="tradingview_12345"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
    {
      "symbols": [
        {"proName": "FOREXCOM:SPXUSD","title": "S&P 500"},
        {"proName": "FOREXCOM:NSXUSD","title": "Nasdaq 100"},
        {"proName": "FX_IDC:EURUSD","title": "EUR/USD"},
        {"proName": "BITSTAMP:BTCUSD","title": "BTC/USD"},
        {"proName": "BITSTAMP:ETHUSD","title": "ETH/USD"}
      ],
      "colorTheme": "dark",
      "isTransparent": true,
      "displayMode": "adaptive",
      "locale": "en"
    }
    </script>
  </div>
</header>

<main>
  <h1>Welcome to Lebanon Roads 2025</h1>
  <p>Your hub for car content, music, and social updates!</p>

  <div class="social-links">
    <a href="https://www.instagram.com/lebanon.roads" target="_blank">📸 Instagram</a>
    <a href="https://www.tiktok.com/@lebanon.roads" target="_blank">🎵 TikTok</a>
    <a href="https://www.youtube.com/channel/UCM_14sQQ0vM0_1H2edJq9tw" target="_blank">▶ YouTube</a>
    <a href="https://x.com/LebanonRoads" target="_blank">𝕏 Twitter/X</a>
    <a href="https://chat.whatsapp.com/" target="_blank">💬 WhatsApp</a>
    <a href="https://play.anghami.com/artist/ossivibes" target="_blank">🎧 Anghami</a>
  </div>

  <!-- Anghami section -->
  <section class="anghami">
    <h2>Listen on Anghami</h2>
    <iframe src="https://play.anghami.com/embed/artist/ossivibes" width="100%" height="380"></iframe>
  </section>

</main>

<footer style="text-align:center; padding:20px; background-color:#222; margin-top:40px;">
  <p>&copy; 2026 Lebanon Roads 2025. All rights reserved.</p>
</footer>

</body>
</html>
