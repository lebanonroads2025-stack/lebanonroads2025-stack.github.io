<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lebanon Roads</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f4f4f4; }
    header, section { padding:20px; }
    header { background:#111; color:#fff; }
    .join-btn { display:block; text-align:center; margin:20px auto; padding:15px; background:#25D366; color:#fff; font-size:20px; text-decoration:none; border-radius:8px; width:250px; }
    h2 { margin-top:0; }
    .social a { margin:0 10px; font-size:24px; color:#111; }
    iframe { border:none; }
    .charts { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }
  </style>
</head>
<body>

  <!-- TradingView Ticker Tape -->
  <header>
    <div class="tradingview-widget-container">
      <div class="tradingview-widget-container__widget"></div>
      <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
      {
        "symbols": [
          { "proName": "FOREXCOM:USDLBP", "title": "USD/LBP" },
          { "proName": "FX_IDC:EURUSD", "title": "EUR/USD" },
          { "proName": "FX_IDC:USDJPY", "title": "USD/JPY" },
          { "proName": "BITSTAMP:BTCUSD", "title": "BTC/USD" }
        ],
        "colorTheme": "dark",
        "isTransparent": false,
        "displayMode": "adaptive",
        "locale": "en"
      }
      </script>
    </div>
  </header>

  <!-- Beirut Weather -->
  <section>
    <h2>Beirut Weather</h2>
    <iframe src="https://forecast7.com/en/33d8935d50/beirut/" width="100%" height="200"></iframe>
  </section>

  <!-- WhatsApp Join Button -->
  <a class="join-btn" href="https://wa.me/96176094703" target="_blank">Join Us on WhatsApp</a>

  <!-- Daily Ego Quote -->
  <section>
    <h2>Daily Ego Quote</h2>
    <blockquote id="egoQuote">Loading...</blockquote>
    <script>
      const quotes = [
        "Drive with pride, not haste.",
        "Your car reflects your spirit.",
        "Roads are made for journeys, not destinations.",
        "Style is the ultimate horsepower."
      ];
      document.getElementById("egoQuote").innerText = quotes[Math.floor(Math.random()*quotes.length)];
    </script>
  </section>

  <!-- Spotify Driving Music -->
  <section>
    <h2>Driving Music</h2>
    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXdPec7aLTmlC" width="100%" height="380" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
  </section>

  <!-- Auto News Feed -->
  <section>
    <h2>Auto News</h2>
    <iframe src="https://www.autoblog.com/" width="100%" height="400"></iframe>
  </section>

  <!-- TradingView Charts -->
  <section>
    <h2>Live Charts</h2>
    <div class="charts">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
        {
          "symbol": "NASDAQ:TSLA",
          "interval": "D",
          "theme": "light",
          "locale": "en",
          "autosize": true,
          "allow_symbol_change": true
        }
        </script>
      </div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
        {
          "symbol": "NYSE:F",
          "interval": "D",
          "theme": "light",
          "locale": "en",
          "autosize": true,
          "allow_symbol_change": true
        }
        </script>
      </div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
        {
          "symbol": "NASDAQ:AAPL",
          "interval": "D",
          "theme": "light",
          "locale": "en",
          "autosize": true,
          "allow_symbol_change": true
        }
        </script>
      </div>
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
        {
          "symbol": "FOREXCOM:USDLBP",
          "interval": "D",
          "theme": "light",
          "locale": "en",
          "autosize": true,
          "allow_symbol_change": true
        }
        </script>
      </div>
    </div>
  </section>

  <!-- Car Videos -->
  <section>
    <h2>Car Videos</h2>
    <iframe width="100%" height="315" src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
  </section>

  <!-- Car Gadgets -->
  <section>
    <h2>Car Gadgets</h2>
    <ul>
      <li><a href="https://www.aliexpress.com/item/1005001234567890.html" target="_blank">Smart Dash Cam</a></li>
      <li><a href="https://www.aliexpress.com/item/1005009876543210.html" target="_blank">Wireless Tire Pressure Monitor</a></li>
      <li><a href="https://www.aliexpress.com/item/1005001928374650.html" target="_blank">Car Vacuum Cleaner</a></li>
    </ul>
  </section>

  <!-- Lebanon Roads Magazine -->
  <section>
    <h2>Lebanon Roads Magazine</h2>
    <iframe src="https://issuu.com/" width="100%" height="400"></iframe>
  </section>

  <!-- Social Links -->
  <section>
    <h2>Follow Lebanon Roads</h2>
    <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook"></i></a>
    <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://twitter.com" target="_blank"><i class="fab fa-twitter"></i></a>
    <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
    <a href="https://t.me/LebanonRoadsBot" target="_blank"><i class="fab fa-telegram"></i></a>
    <a href="https://wa.me/96176094703" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <a href="https://spotify.com" target="_blank"><i class="fab fa-spotify"></i></a>
  </section>

</body>
</html>
